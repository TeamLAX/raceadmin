<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>B2V Admin | Team LAX 2026</title>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Barlow+Condensed:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #1a1108;
      --surface: #2a1c0e;
      --surface2: #3a2816;
      --border: #4a3520;
      --accent: #f59e0b;
      --accent-dim: #b87308;
      --text: #f5f0e8;
      --text-dim: #a89880;
      --green: #22c55e;
      --red: #ef4444;
      --radius: 10px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      font-family: 'Barlow Condensed', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── PIN Gate ── */
    .pin-gate {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }
    .pin-gate h1 {
      font-family: 'Oswald', sans-serif;
      font-size: 1.6rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.5rem;
    }
    .pin-gate .subtitle {
      color: var(--text-dim);
      font-size: 0.9rem;
      margin-bottom: 2rem;
    }
    .pin-input {
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: 'Oswald', sans-serif;
      font-size: 2rem;
      text-align: center;
      letter-spacing: 0.5em;
      padding: 0.8rem 1.5rem;
      width: 200px;
      outline: none;
      transition: border-color 0.2s;
    }
    .pin-input:focus { border-color: var(--accent); }
    .pin-input.error { border-color: var(--red); animation: shake 0.4s; }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-8px); }
      75% { transform: translateX(8px); }
    }
    .pin-btn {
      margin-top: 1.5rem;
      background: var(--accent);
      color: var(--bg);
      font-family: 'Oswald', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      border: none;
      border-radius: var(--radius);
      padding: 0.8rem 2.5rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    .pin-btn:active { background: var(--accent-dim); }

    /* ── Admin Shell ── */
    .admin-header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 1rem 1.2rem;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .admin-header h1 {
      font-family: 'Oswald', sans-serif;
      font-size: 1.3rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .admin-header .sync-status {
      font-size: 0.75rem;
      color: var(--text-dim);
      margin-top: 2px;
    }
    .admin-header .sync-status.syncing { color: var(--accent); }
    .admin-header .sync-status.error { color: var(--red); }

    /* ── Stopwatch Control Panel ── */
    .clock-panel {
      background: var(--surface);
      border: 2px solid var(--accent);
      border-radius: var(--radius);
      margin: 0.8rem;
      padding: 14px 16px;
    }
    .clock-panel-title {
      font-family: 'Oswald', sans-serif;
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--accent);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .clock-panel-title::before {
      content: '⏱';
    }
    .clock-display {
      font-family: 'Oswald', sans-serif;
      font-size: 2rem;
      font-weight: 700;
      text-align: center;
      padding: 8px 0;
      letter-spacing: 0.05em;
    }
    .clock-display.running { color: var(--green); }
    .clock-display.stopped { color: var(--red); }
    .clock-display.confirmed { color: var(--accent); }
    .clock-advisory {
      text-align: center;
      font-family: 'Oswald', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--red);
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 6px;
      padding: 8px;
      margin: 8px 0;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      animation: advisoryPulse 2s infinite;
    }
    @keyframes advisoryPulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }
    .clock-buttons {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }
    .clock-btn {
      flex: 1;
      font-family: 'Oswald', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 10px 8px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      color: #fff;
    }
    .clock-btn.start { background: var(--green); }
    .clock-btn.stop { background: var(--red); }
    .clock-btn.confirm { background: var(--accent); color: var(--bg); }
    .clock-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .clock-section {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
    }
    .clock-section label {
      font-size: 0.75rem;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      display: block;
      margin-bottom: 4px;
    }
    .clock-section input {
      width: 100%;
      padding: 8px 10px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: 'Oswald', sans-serif;
      font-size: 0.95rem;
    }
    .clock-section .input-row {
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }
    .clock-section .input-row input { flex: 1; }
    .clock-section .input-row .clock-btn { flex: 0 0 auto; padding: 8px 14px; }
    .clock-status-badge {
      font-size: 0.65rem;
      padding: 2px 8px;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-weight: 600;
    }
    .clock-status-badge.running { background: var(--green); color: #fff; }
    .clock-status-badge.stopped { background: var(--red); color: #fff; }
    .clock-status-badge.confirmed { background: var(--accent); color: var(--bg); }
    .clock-status-badge.waiting { background: rgba(255,255,255,0.2); color: #fff; }

    /* ── Runner List ── */
    .runner-list {
      padding: 0.8rem;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding-bottom: 100px;
    }

    /* ── Runner Card (collapsed) ── */
    .runner-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: border-color 0.2s;
    }
    .runner-card.active-runner { border-color: var(--green); }
    .runner-card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      cursor: pointer;
      -webkit-user-select: none;
      user-select: none;
    }
    .runner-card-header .leg-badge {
      font-family: 'Oswald', sans-serif;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--bg);
      background: var(--accent);
      border-radius: 4px;
      padding: 2px 8px;
      flex-shrink: 0;
    }
    .runner-card.active-runner .leg-badge { background: var(--green); }
    .runner-card-header .runner-summary {
      flex: 1;
      overflow: hidden;
    }
    .runner-card-header .runner-summary .name {
      font-weight: 600;
      font-size: 0.95rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .runner-card-header .runner-summary .name.empty { color: var(--text-dim); font-style: italic; }
    .runner-card-header .runner-summary .meta {
      font-size: 0.7rem;
      color: var(--text-dim);
    }
    .runner-card-header .chevron {
      color: var(--text-dim);
      font-size: 1.2rem;
      transition: transform 0.2s;
      flex-shrink: 0;
    }
    .runner-card.open .chevron { transform: rotate(180deg); }
    .runner-card-header .active-dot {
      width: 8px;
      height: 8px;
      background: var(--green);
      border-radius: 50%;
      flex-shrink: 0;
      animation: pulse-dot 1.4s infinite;
    }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* ── Runner Card (expanded) ── */
    .runner-card-body {
      display: none;
      padding: 0 12px 14px;
    }
    .runner-card.open .runner-card-body { display: block; }

    .field-row {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
    }
    .field {
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .field label {
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-dim);
      margin-bottom: 3px;
    }
    .field input, .field select {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.9rem;
      padding: 8px 10px;
      outline: none;
      width: 100%;
      transition: border-color 0.2s;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); }
    .field input::placeholder { color: var(--text-dim); opacity: 0.5; }

    .actions-row {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }
    .btn-save {
      flex: 1;
      background: var(--accent);
      color: var(--bg);
      font-family: 'Oswald', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      border: none;
      border-radius: 6px;
      padding: 10px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-save:active { background: var(--accent-dim); }
    .btn-save:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-save.saved { background: var(--green); }

    .btn-set-active {
      background: transparent;
      border: 1px solid var(--green);
      color: var(--green);
      font-family: 'Oswald', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      border-radius: 6px;
      padding: 10px 14px;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .btn-set-active:active { background: var(--green); color: var(--bg); }
    .btn-set-active.is-active {
      background: var(--green);
      color: var(--bg);
      pointer-events: none;
    }

    /* ── Halfway Checkbox ── */
    .halfway-check {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      -webkit-user-select: none;
      user-select: none;
    }
    .halfway-check input[type="checkbox"] {
      width: 20px;
      height: 20px;
      accent-color: var(--accent);
      cursor: pointer;
    }
    .halfway-check span {
      font-size: 0.85rem;
      color: var(--text-dim);
    }

    /* ── Photo Upload ── */
    .photo-upload-row {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      margin-bottom: 8px;
    }
    .photo-preview {
      width: 64px;
      height: 64px;
      border-radius: 8px;
      border: 2px solid var(--border);
      overflow: hidden;
      flex-shrink: 0;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .photo-preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .no-photo {
      font-size: 0.55rem;
      color: var(--text-dim);
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .photo-buttons {
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex: 1;
    }
    .btn-photo {
      display: block;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.8rem;
      padding: 8px 12px;
      cursor: pointer;
      text-align: center;
      transition: border-color 0.2s;
    }
    .btn-photo:active { border-color: var(--accent); }
    .photo-status {
      font-size: 0.65rem;
      color: var(--accent);
    }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 20px;
      font-size: 0.8rem;
      z-index: 200;
      max-width: 90vw;
      text-align: center;
      word-break: break-word;
      transition: transform 0.3s;
      white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.success { border-color: var(--green); color: var(--green); }
    .toast.error { border-color: var(--red); color: var(--red); }
  </style>
</head>
<body>

<div id="app"></div>
<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════════
// CONFIG — Replace with your deployed Apps Script URL
// ═══════════════════════════════════════════════════
const API_URL = 'https://script.google.com/macros/s/AKfycbw3wLqaeIWBC9NNuvCmQDoLh8OtQZJ771jUtUFrq3YgiOPB1FPEEDkzopPTfOpfdcuK/exec';
// ═══════════════════════════════════════════════════

let PIN = '';
let runners = [];
let adminAlternates = [];
let openCard = null;

function showToast(msg, type = 'success', duration = 2500) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + type + ' show';
  setTimeout(() => t.className = 'toast', duration);
}

// ── PIN Gate ──
function renderPinGate(error = false) {
  document.getElementById('app').innerHTML = `
    <div class="pin-gate">
      <h1>B2V Admin</h1>
      <div class="subtitle">Team LAX 2026</div>
      <input type="password" inputmode="numeric" class="pin-input ${error ? 'error' : ''}" 
             id="pinInput" maxlength="10" placeholder="• • • •" autofocus />
      <button class="pin-btn" onclick="submitPin()">Enter</button>
    </div>`;
  
  document.getElementById('pinInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') submitPin();
  });
}

async function submitPin() {
  PIN = document.getElementById('pinInput').value.trim();
  if (!PIN) { renderPinGate(true); return; }

  const btn = document.querySelector('.pin-btn');
  btn.disabled = true;
  btn.textContent = 'Loading...';

  // Load runner data via JSONP (bypasses CORS)
  try {
    const data = await fetchData();

    if (data && data.status === 'ok' && data.runners) {
      // Validate PIN with a POST
      try {
        const result = await postJSON({ pin: PIN, leg: 1 });
        if (result && result.status === 'error' && result.message === 'Invalid PIN') {
          btn.disabled = false;
          btn.textContent = 'Enter';
          showToast('Invalid PIN', 'error');
          renderPinGate(true);
          return;
        }
      } catch (e) { /* proceed, validate on save */ }

      runners = data.runners;
      if (data.clock) {
        clockState = { ...clockState, ...data.clock };
      }
      if (data.alternates) {
        adminAlternates = data.alternates;
      }
      renderAdmin();

      return;
    } else {
      btn.disabled = false;
      btn.textContent = 'Enter';
      showToast('API error: ' + (data && data.message ? data.message : 'Unknown'), 'error', 8000);
      renderPinGate(false);
      return;
    }
  } catch (err) {
    btn.disabled = false;
    btn.textContent = 'Enter';
    showToast('Load failed: ' + err.message, 'error', 8000);
    renderPinGate(false);
    return;
  }
}

// ── Fetch helpers ──
function fetchData() {
  return new Promise((resolve, reject) => {
    const cbName = '_b2v_admin_' + Date.now();
    const timeout = setTimeout(() => {
      delete window[cbName];
      const s = document.getElementById(cbName);
      if (s) s.remove();
      reject(new Error('Timeout loading data'));
    }, 15000);

    window[cbName] = function(data) {
      clearTimeout(timeout);
      delete window[cbName];
      const s = document.getElementById(cbName);
      if (s) s.remove();
      resolve(data);
    };

    const script = document.createElement('script');
    script.id = cbName;
    script.src = API_URL + '?callback=' + cbName + '&t=' + Date.now();
    script.onerror = function() {
      clearTimeout(timeout);
      delete window[cbName];
      script.remove();
      reject(new Error('Script load failed'));
    };
    document.head.appendChild(script);
  });
}

function postJSON(payload) {
  // Use fetch with redirect follow — Apps Script redirects POSTs
  return fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify(payload),
    redirect: 'follow'
  })
  .then(function(res) { return res.text(); })
  .then(function(text) {
    try { return JSON.parse(text); }
    catch (e) { return { status: 'ok' }; }
  });
}

// Reliable clock save via JSONP GET (bypasses CORS completely)
function saveClockViaJSONP(action, params) {
  return new Promise(function(resolve) {
    var cbName = '_clk_' + Date.now();
    var url = API_URL + '?callback=' + cbName + '&clockAction=' + action;
    for (var k in params) {
      if (params[k]) url += '&' + k + '=' + encodeURIComponent(params[k]);
    }
    url += '&pin=' + encodeURIComponent(PIN);
    
    console.log('Clock save URL:', url);
    
    window[cbName] = function(data) {
      delete window[cbName];
      var s = document.getElementById(cbName);
      if (s) s.remove();
      console.log('Clock save response:', JSON.stringify(data));
      showToast('Response: ' + (data && data.message ? data.message : JSON.stringify(data)));
      resolve(data);
    };
    var script = document.createElement('script');
    script.id = cbName;
    script.src = url;
    script.onerror = function() {
      delete window[cbName];
      script.remove();
      console.log('Clock save JSONP failed');
      showToast('Clock save failed — script error', 'error');
      resolve({ status: 'error' });
    };
    document.head.appendChild(script);
    
    // Timeout
    setTimeout(function() {
      if (window[cbName]) {
        delete window[cbName];
        var s = document.getElementById(cbName);
        if (s) s.remove();
        showToast('Clock save timed out — PIN may be wrong', 'error');
        resolve({ status: 'error', message: 'timeout' });
      }
    }, 10000);
  });
}

// ── Clock State — loaded from Google Sheet, no hardcoded defaults ──
let clockState = {
  status: 'stopped',
  autoStartTime: '',
  stoppedAt: '',
  confirmedTime: '',
  advisory: ''
};

function renderClockPanel() {
  const isRunning = clockState.status === 'running';
  const isStopped = clockState.status === 'stopped';
  const isConfirmed = clockState.status === 'confirmed';
  const statusClass = isRunning ? 'running' : isConfirmed ? 'confirmed' : isStopped && clockState.stoppedAt ? 'stopped' : 'waiting';
  const statusLabel = isRunning ? 'Running' : isConfirmed ? 'Confirmed' : isStopped && clockState.stoppedAt ? 'Stopped' : 'Not Set';
  
  return `
    <div class="clock-panel">
      <div class="clock-panel-title">Viewer Stopwatch Control <span class="clock-status-badge ${statusClass}">${statusLabel}</span></div>
      
      ${isStopped && clockState.advisory ? '<div class="clock-advisory">' + clockState.advisory + '</div>' : ''}
      
      <div class="clock-section">
        <label>Race Start Date & Time</label>
        <div class="input-row">
          <input type="datetime-local" id="autoStartInput" 
            value="${clockState.autoStartTime ? clockState.autoStartTime.slice(0,16) : ''}" />
          <button class="clock-btn confirm" onclick="doClockSetAutoStart()">Set</button>
        </div>
        <div style="font-size:0.65rem;color:rgba(255,255,255,0.4);margin-top:4px">Viewer stopwatch starts automatically at this time</div>
      </div>
      
      <div class="clock-buttons">
        <button class="clock-btn stop" ${!isRunning ? 'disabled' : ''} 
          onclick="doClockStop()">
          ■ Stop Clock
        </button>
      </div>
      
      ${(isStopped && clockState.stoppedAt) || isConfirmed ? `
      <div class="clock-section">
        <label>Adjusted / Confirmed Final Time (HH:MM:SS)</label>
        <div class="input-row">
          <input type="text" id="confirmedTimeInput" placeholder="e.g. 13:42:18" 
            value="${clockState.confirmedTime || clockState.stoppedAt || ''}" />
          <button class="clock-btn confirm" onclick="doClockConfirm()">Confirm</button>
        </div>
      </div>` : ''}
    </div>`;
}

// Clock starts automatically from the set date/time — no manual start button

function doClockStop() {
  // Calculate elapsed time to save as stoppedAt
  var time = '00:00:00';
  if (clockState.autoStartTime) {
    var start = new Date(clockState.autoStartTime).getTime();
    var elapsed = Date.now() - start;
    if (elapsed > 0) {
      var h = Math.floor(elapsed / 3600000);
      var m = Math.floor((elapsed % 3600000) / 60000);
      var s = Math.floor((elapsed % 60000) / 1000);
      time = String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
    }
  }
  clockState.status = 'stopped';
  clockState.stoppedAt = time;
  clockState.advisory = 'UNCONFIRMED, ADJUSTMENT PENDING';
  renderAdmin();
  showToast('Saving stop to sheet...');
  saveClockViaJSONP('stop', { stoppedAt: time }).then(function(res) {
    if (res && res.status === 'ok') showToast('Clock stopped at ' + time);
    else showToast('Save may have failed', 'error');
  });
}

function doClockConfirm() {
  var input = document.getElementById('confirmedTimeInput');
  var time = input ? input.value : '';
  if (!time) { showToast('Enter a time first', 'error'); return; }
  clockState.status = 'confirmed';
  clockState.confirmedTime = time;
  clockState.advisory = '';

  renderAdmin();
  showToast('Saving confirmed time...');
  saveClockViaJSONP('confirm', { confirmedTime: time }).then(function(res) {
    if (res && res.status === 'ok') showToast('Time confirmed: ' + time);
    else showToast('Save may have failed', 'error');
  });
}

function doClockSetAutoStart() {
  var input = document.getElementById('autoStartInput');
  var val = input ? input.value : '';
  if (!val) { showToast('Enter a date/time first', 'error'); return; }
  // Build ISO string with local timezone offset
  var date = new Date(val);
  var offset = date.getTimezoneOffset(); // minutes, positive = west of UTC
  var sign = offset <= 0 ? '+' : '-';
  var absOff = Math.abs(offset);
  var offHrs = String(Math.floor(absOff / 60)).padStart(2, '0');
  var offMins = String(absOff % 60).padStart(2, '0');
  clockState.autoStartTime = val + ':00' + sign + offHrs + ':' + offMins;
  clockState.status = 'running';
  clockState.stoppedAt = '';
  clockState.confirmedTime = '';
  clockState.advisory = '';
  renderAdmin();

  showToast('Saving to sheet...');
  saveClockViaJSONP('start', { autoStartTime: clockState.autoStartTime }).then(function(res) {
    if (res && res.status === 'ok') showToast('Race start saved');
    else showToast('Save may have failed — check sheet', 'error');
  });
}

function openCropComposer(leg, imgSrc) {
  // Create crop overlay
  var overlay = document.createElement('div');
  overlay.id = 'cropOverlay';
  overlay.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.92);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px';
  
  overlay.innerHTML = `
    <div style="font-family:Gabarito,sans-serif;font-size:1rem;font-weight:700;color:#f59e0b;margin-bottom:12px">Crop & Center Photo</div>
    <div style="font-size:0.7rem;color:rgba(255,255,255,0.5);margin-bottom:12px">Drag to reposition • Pinch/scroll to zoom</div>
    <div id="cropFrame" style="width:250px;height:250px;border-radius:12px;overflow:hidden;border:3px solid #f59e0b;position:relative;touch-action:none;cursor:grab;background:#000">
      <img id="cropImg" src="${imgSrc}" style="position:absolute;user-select:none;-webkit-user-drag:none;pointer-events:none" />
    </div>
    <div style="display:flex;align-items:center;gap:10px;margin-top:14px;width:250px">
      <span style="font-size:0.7rem;color:rgba(255,255,255,0.4)">−</span>
      <input type="range" id="cropZoom" min="100" max="400" value="100" style="flex:1;accent-color:#f59e0b" />
      <span style="font-size:0.7rem;color:rgba(255,255,255,0.4)">+</span>
    </div>
    <div style="display:flex;gap:10px;margin-top:16px">
      <button onclick="applyCrop(${leg})" style="padding:10px 24px;background:#f59e0b;color:#1a0f05;border:none;border-radius:6px;font-family:Gabarito,sans-serif;font-weight:700;cursor:pointer">Apply</button>
      <button onclick="cancelCrop()" style="padding:10px 24px;background:rgba(255,255,255,0.1);color:#fff;border:none;border-radius:6px;font-family:Gabarito,sans-serif;font-weight:700;cursor:pointer">Cancel</button>
    </div>`;
  
  document.body.appendChild(overlay);
  
  var img = document.getElementById('cropImg');
  var frame = document.getElementById('cropFrame');
  var zoom = document.getElementById('cropZoom');
  var scale = 1;
  var offsetX = 0, offsetY = 0;
  var dragging = false;
  var startX, startY, startOX, startOY;
  
  img.onload = function() {
    // Fit image to cover the frame
    var frameW = 250, frameH = 250;
    var ratio = Math.max(frameW / img.naturalWidth, frameH / img.naturalHeight);
    scale = ratio;
    zoom.min = Math.round(ratio * 100);
    zoom.max = Math.round(ratio * 400);
    zoom.value = Math.round(ratio * 100);
    updateCropImg();
  };
  if (img.complete) img.onload();
  
  function updateCropImg() {
    var w = img.naturalWidth * scale;
    var h = img.naturalHeight * scale;
    img.style.width = w + 'px';
    img.style.height = h + 'px';
    img.style.left = offsetX + 'px';
    img.style.top = offsetY + 'px';
  }
  
  zoom.addEventListener('input', function() {
    var oldScale = scale;
    scale = parseInt(zoom.value) / 100;
    // Keep centered on zoom
    var cx = 125 - offsetX;
    var cy = 125 - offsetY;
    offsetX = 125 - cx * (scale / oldScale);
    offsetY = 125 - cy * (scale / oldScale);
    clampOffset();
    updateCropImg();
  });
  
  function clampOffset() {
    var w = img.naturalWidth * scale;
    var h = img.naturalHeight * scale;
    if (offsetX > 0) offsetX = 0;
    if (offsetY > 0) offsetY = 0;
    if (offsetX < 250 - w) offsetX = 250 - w;
    if (offsetY < 250 - h) offsetY = 250 - h;
  }
  
  frame.addEventListener('mousedown', function(e) { dragging = true; startX = e.clientX; startY = e.clientY; startOX = offsetX; startOY = offsetY; frame.style.cursor = 'grabbing'; });
  window.addEventListener('mousemove', function(e) { if (!dragging) return; offsetX = startOX + (e.clientX - startX); offsetY = startOY + (e.clientY - startY); clampOffset(); updateCropImg(); });
  window.addEventListener('mouseup', function() { dragging = false; frame.style.cursor = 'grab'; });
  
  frame.addEventListener('touchstart', function(e) { if (e.touches.length === 1) { dragging = true; startX = e.touches[0].clientX; startY = e.touches[0].clientY; startOX = offsetX; startOY = offsetY; } }, {passive:true});
  frame.addEventListener('touchmove', function(e) { if (dragging && e.touches.length === 1) { offsetX = startOX + (e.touches[0].clientX - startX); offsetY = startOY + (e.touches[0].clientY - startY); clampOffset(); updateCropImg(); } }, {passive:true});
  frame.addEventListener('touchend', function() { dragging = false; });
  
  frame.addEventListener('wheel', function(e) { e.preventDefault(); var oldScale = scale; scale *= e.deltaY < 0 ? 1.05 : 0.95; var minScale = parseInt(zoom.min) / 100; if (scale < minScale) scale = minScale; if (scale > parseInt(zoom.max) / 100) scale = parseInt(zoom.max) / 100; zoom.value = Math.round(scale * 100); var cx = 125 - offsetX; var cy = 125 - offsetY; offsetX = 125 - cx * (scale / oldScale); offsetY = 125 - cy * (scale / oldScale); clampOffset(); updateCropImg(); }, {passive:false});
}

function applyCrop(leg) {
  var img = document.getElementById('cropImg');
  var canvas = document.createElement('canvas');
  canvas.width = 400;
  canvas.height = 400;
  var ctx = canvas.getContext('2d');
  
  var displayW = parseFloat(img.style.width);
  var displayH = parseFloat(img.style.height);
  var offX = parseFloat(img.style.left);
  var offY = parseFloat(img.style.top);
  
  // Map from 250px frame to 400px output
  var ratio = 400 / 250;
  var sx = -offX * (img.naturalWidth / displayW);
  var sy = -offY * (img.naturalHeight / displayH);
  var sw = 250 * (img.naturalWidth / displayW);
  var sh = 250 * (img.naturalHeight / displayH);
  
  ctx.drawImage(img, sx, sy, sw, sh, 0, 0, 400, 400);
  
  var dataUrl = canvas.toDataURL('image/jpeg', 0.7);
  
  document.getElementById('preview-' + leg).innerHTML = '<img src="' + dataUrl + '" alt="Preview" />';
  document.getElementById('photodata-' + leg).value = dataUrl;
  document.getElementById('photo-status-' + leg).textContent = 'Cropped — save to upload';
  
  cancelCrop();
}

// ── Course Clock → Run Time Calculator ──
// Parses "H:MM:SS" or "HH:MM:SS" into total seconds
function parseCourseTime(str) {
  if (!str || str === '--:--') return null;
  str = str.trim();
  var parts = str.split(':');
  if (parts.length === 3) {
    return (parseInt(parts[0])||0)*3600 + (parseInt(parts[1])||0)*60 + (parseInt(parts[2])||0);
  }
  if (parts.length === 2) {
    return (parseInt(parts[0])||0)*3600 + (parseInt(parts[1])||0)*60;
  }
  return null;
}

// Formats seconds into "H:MM:SS"
function formatTime(totalSec) {
  if (totalSec === null || totalSec < 0) return '--:--';
  var h = Math.floor(totalSec / 3600);
  var m = Math.floor((totalSec % 3600) / 60);
  var s = totalSec % 60;
  return h + ':' + String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
}

// Converts course clock seconds to wall clock time (race start + elapsed)
function courseTimeToWallClock(courseSec) {
  if (courseSec === null) return '--:-- PDT';
  // Use the clock's autoStartTime
  var startStr = clockState.autoStartTime || '2026-03-28T15:00:00-07:00';
  var startMs = new Date(startStr).getTime();
  if (isNaN(startMs)) return '--:-- PDT';
  var wallMs = startMs + (courseSec * 1000);
  var d = new Date(wallMs);
  var hr = d.getHours();
  var mn = d.getMinutes();
  var ampm = hr >= 12 ? 'PM' : 'AM';
  if (hr > 12) hr -= 12;
  if (hr === 0) hr = 12;
  return hr + ':' + String(mn).padStart(2,'0') + ' ' + ampm + ' PDT';
}

// Called on input — calculates this runner's leg time from course clock difference
function calcRunTime(leg) {
  var courseTimeStr = document.getElementById('coursetime-' + leg).value;
  var currentSec = parseCourseTime(courseTimeStr);
  
  // Find the previous leg's course time
  var prevSec = null;
  if (leg > 1) {
    var prevEl = document.getElementById('coursetime-' + (leg - 1));
    if (prevEl && prevEl.value) {
      prevSec = parseCourseTime(prevEl.value);
    } else {
      // Check stored data
      var prevRunner = runners.find(r => r.leg === (leg - 1));
      if (prevRunner && prevRunner.coursetime) {
        prevSec = parseCourseTime(prevRunner.coursetime);
      }
    }
  } else {
    // Leg 1 — previous is 0:00:00 (race start)
    prevSec = 0;
  }
  
  // Calculate individual run time
  var timeEl = document.getElementById('time-' + leg);
  var startEl = document.getElementById('start-' + leg);
  
  if (currentSec !== null && prevSec !== null) {
    var runSec = currentSec - prevSec;
    timeEl.value = formatTime(runSec);
    // Set start time as wall clock when this runner started (= previous crossing time)
    startEl.value = courseTimeToWallClock(prevSec);
  } else if (currentSec !== null) {
    timeEl.value = '--:--';
    startEl.value = courseTimeToWallClock(prevSec);
  }
}

async function saveRunner(leg) {
  const btn = document.getElementById('save-' + leg);
  btn.disabled = true;
  btn.textContent = 'Saving...';
  
  const photoData = document.getElementById('photodata-' + leg).value;
  
  const payload = {
    pin: PIN,
    leg: leg,
    name:       document.getElementById('name-' + leg).value,
    photo:      document.getElementById('photo-' + leg).value,
    distance:   document.getElementById('distance-' + leg).value,
    difficulty: parseInt(document.getElementById('difficulty-' + leg).value) || 5,
    time:       document.getElementById('time-' + leg).value,
    start:      document.getElementById('start-' + leg).value,
    coursetime: document.getElementById('coursetime-' + leg).value,
    years:      document.getElementById('years-' + leg).value,
    halfway:    document.getElementById('halfway-' + leg).checked,
    message:    document.getElementById('message-' + leg).value
  };
  
  // Include photo data if a new photo was selected
  if (photoData) {
    payload.photoData = photoData;
    btn.textContent = 'Uploading photo...';
  }

  try {
    const result = await postJSON(payload);
    
    if (result.status === 'error') {
      btn.disabled = false;
      btn.textContent = 'Save Stage ' + leg;
      showToast(result.message, 'error');
      if (result.message === 'Invalid PIN') renderPinGate(true);
      return;
    }
    
    // Update local state
    const runner = runners.find(r => r.leg === leg);
    if (runner) {
      runner.name = payload.name;
      // If server returned a new photo URL (from upload), use it
      if (result.photoUrl) {
        runner.photo = result.photoUrl;
      } else {
        runner.photo = payload.photo;
      }
      runner.distance = payload.distance;
      runner.difficulty = payload.difficulty;
      runner.time = payload.time;
      runner.start = payload.start;
      runner.coursetime = payload.coursetime;
      runner.years = payload.years;
    }
    
    // Clear the pending photo data
    const pdEl = document.getElementById('photodata-' + leg);
    if (pdEl) pdEl.value = '';
    
    btn.textContent = 'Saved ✓';
    btn.classList.add('saved');
    showToast('Stage ' + leg + ' saved');
    
    setTimeout(() => {
      btn.disabled = false;
      btn.textContent = 'Save Stage ' + leg;
      btn.classList.remove('saved');
      renderAdmin();
    }, 1500);
    
  } catch (err) {
    btn.disabled = false;
    btn.textContent = 'Save Stage ' + leg;
    showToast('Save failed — ' + err.message, 'error');
  }
}

async function setActive(leg) {
  const payload = {
    pin: PIN,
    leg: leg,
    setActive: true
  };

  try {
    const result = await postJSON(payload);
    
    if (result.status === 'error') {
      showToast(result.message, 'error');
      if (result.message === 'Invalid PIN') renderPinGate(true);
      return;
    }
    
    // Update local state
    runners.forEach(r => r.active = false);
    const runner = runners.find(r => r.leg === leg);
    if (runner) runner.active = true;
    
    showToast('Stage ' + leg + ' is now active');
    renderAdmin();
    
  } catch (err) {
    showToast('Failed to set active — ' + err.message, 'error');
  }
}

function saveClockViaJSONPAlt(params) {
  return new Promise(function(resolve) {
    var cbName = '_alt_' + Date.now();
    var url = API_URL + '?callback=' + cbName + '&pin=' + encodeURIComponent(PIN);
    for (var k in params) {
      if (params[k] !== undefined && params[k] !== null) url += '&' + k + '=' + encodeURIComponent(params[k]);
    }
    window[cbName] = function(data) {
      delete window[cbName];
      var s = document.getElementById(cbName);
      if (s) s.remove();
      resolve(data);
    };
    var script = document.createElement('script');
    script.id = cbName;
    script.src = url;
    script.onerror = function() {
      delete window[cbName];
      script.remove();
      resolve({ status: 'error' });
    };
    document.head.appendChild(script);
    setTimeout(function() {
      if (window[cbName]) {
        delete window[cbName];
        var s = document.getElementById(cbName);
        if (s) s.remove();
        resolve({ status: 'error', message: 'timeout' });
      }
    }, 12000);
  });
}

async function saveAlternate() {
  var name = document.getElementById('altName').value.trim();
  var years = document.getElementById('altYears').value.trim();
  var isCiv = document.getElementById('altCiv').checked;
  if (!name) { showToast('Enter a name', 'error'); return; }
  showToast('Saving alternate...');
  var res = await saveClockViaJSONPAlt({
    altAction: 'save',
    row: 0,
    name: name,
    years: years,
    type: isCiv ? 'CIV' : 'SWN'
  });
  if (res && res.status === 'ok') {
    adminAlternates.push({ name: name, years: years, type: isCiv ? 'CIV' : 'SWN' });
    showToast('Alternate added');
    document.getElementById('altName').value = '';
    document.getElementById('altYears').value = '';
    document.getElementById('altCiv').checked = false;
    document.getElementById('altList').innerHTML = renderAlternatesList();
  } else {
    showToast('Save failed', 'error');
  }
}

async function deleteAlternate(row) {
  if (!confirm('Delete this alternate?')) return;
  showToast('Deleting...');
  var res = await saveClockViaJSONPAlt({ altAction: 'delete', row: row });
  if (res && res.status === 'ok') {
    adminAlternates.splice(row - 1, 1);
    showToast('Deleted');
    document.getElementById('altList').innerHTML = renderAlternatesList();
  } else {
    showToast('Delete failed', 'error');
  }
}

// ── Init ──
renderPinGate();
</script>
